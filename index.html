<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>7TBRP Diffusion MRI Normative Charts</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #1e2631;
  --border:    #30363d;
  --accent:    #58a6ff;
  --accent2:   #3fb950;
  --accent3:   #f78166;
  --text:      #e6edf3;
  --text-muted:#7d8590;
  --text-dim:  #484f58;
  --radius:    8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.header-title .main {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--text);
}

.header-title .sub {
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.logo-left, .logo-right { height: 38px; flex-shrink: 0; }

/* ── LAYOUT ─────────────────────────────────────────── */
.layout {
  display: flex;
  flex: 1;
  overflow: visible;
}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px 16px 24px;
  gap: 20px;
}
.sidebar {
  position: relative;
  z-index: 10;
}

.section-label {
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* ── FIELD GROUPS ────────────────────────────────────── */
.field-group { display: flex; flex-direction: column; }

/* ── CUSTOM SELECT ───────────────────────────────────── */
.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 12px;
}

select {
  appearance: none;
  width: 100%;
  padding: 8px 28px 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}

select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
}

select option { background: #1e2631; }
select optgroup { background: #161b22; font-weight: 600; }

/* ── GENDER PILLS ────────────────────────────────────── */
.gender-pills {
  display: flex;
  gap: 8px;
}

.gender-pill {
  flex: 1;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text-muted);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.gender-pill:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

.gender-pill.active-F {
  background: rgba(88,166,255,0.12);
  border-color: var(--accent);
  color: var(--accent);
}

.gender-pill.active-M {
  background: rgba(63,185,80,0.12);
  border-color: var(--accent2);
  color: var(--accent2);
}

/* ── HEMISPHERE PILLS ────────────────────────────────── */
.hemi-pills {
  display: flex;
  gap: 8px;
}

.hemi-pill {
  flex: 1;
  padding: 7px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.hemi-pill:hover:not(:disabled) {
  border-color: var(--text-muted);
  color: var(--text);
}

.hemi-pill.active {
  background: rgba(247,129,102,0.12);
  border-color: var(--accent3);
  color: var(--accent3);
}

.hemi-pill:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ── ROI PREVIEW TAG ─────────────────────────────────── */
#roi-preview {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  margin-top: 8px;
  min-height: 28px;
  word-break: break-all;
  line-height: 1.5;
}

#roi-preview span.key { color: var(--accent); }
#roi-preview span.warn { color: var(--accent3); }

/* ── DIVIDER ─────────────────────────────────────────── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: var(--radius);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #0d1117;
}

.btn-primary:hover { background: #79b8ff; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--accent3); border-color: var(--accent3); }

.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; }

/* ── ACTIVE CURVES LIST ──────────────────────────────── */
#curve-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.curve-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text-muted);
  animation: fadeIn 0.2s ease;
}

.curve-tag {
  position: relative;
  overflow: visible;
}

.curve-tooltip {

  position: absolute;

  left: 105%;
  top: 50%;

  transform: translateY(-50%);

  background: #0f141b;

  border: 1px solid var(--border);

  color: var(--text);

  padding: 8px 10px;

  border-radius: 6px;

  font-size: 11px;

  font-family: 'IBM Plex Mono', monospace;

  white-space: normal;

  width: max-content;

  min-width: 180px;

  max-width: 420px;

  line-height: 1.4;

  z-index: 999999;

  opacity: 0;

  pointer-events: none;

  transition: opacity 0.12s ease;

  box-shadow: 0 4px 16px rgba(0,0,0,0.35);

  overflow-wrap: break-word;
}

.curve-tag:hover .curve-tooltip {
  opacity: 1;
}

@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

.curve-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.curve-tag-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.curve-remove {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.15s;
  flex-shrink: 0;
}

.curve-remove:hover { color: var(--accent3); }

#no-curves {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  text-align: center;
  padding: 8px 0;
}

/* ── MAIN GRAPH ──────────────────────────────────────── */
.graph-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: visible;
  padding: 16px;
  gap: 12px;
}

#graph {
  flex: 1;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: #ffffff;
  overflow: hidden;
}

/* ── STATUS BAR ──────────────────────────────────────── */
#status-bar {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
}

#status-bar.error   { color: var(--accent3); border-color: rgba(247,129,102,0.3); }
#status-bar.ok      { color: var(--accent2); border-color: rgba(63,185,80,0.3); }
#status-bar.loading { color: var(--accent); }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── MACRO-GROUP PILLS ───────────────────────────────── */
.macro-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.macro-pill {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.macro-pill:hover { border-color: var(--text-muted); color: var(--text); }

.macro-pill.active {
  background: rgba(88,166,255,0.15);
  border-color: var(--accent);
  color: var(--accent);
}
</style>
</head>

<body>

<header>
  <img src="assets/logo_Pitt_neg.png" class="logo-left" onerror="this.style.display='none'">
  <div class="header-title">
    <span class="main">7TBRP Diffusion MRI — Normative Charts</span>
    <span class="sub">GAMLSS · SHASH · Age-based centile curves</span>
  </div>
  <img src="assets/logo_USP_EESC_neg.png" class="logo-right" onerror="this.style.display='none'">
</header>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">

    <!-- GENDER -->
    <div class="field-group">
      <div class="section-label">Sex</div>
      <div class="gender-pills">
        <button class="gender-pill active-F" data-val="F" onclick="setGender('F')">♀ Female</button>
        <button class="gender-pill" data-val="M" onclick="setGender('M')">♂ Male</button>
      </div>
    </div>

    <hr class="divider">

    <!-- METRIC -->
    <div class="field-group">
      <div class="section-label">Metric</div>
      <div class="select-wrap">
        <select id="metricas">
          <optgroup label="DTI">
            <option value="dti_fa">DTI — FA (Fractional Anisotropy)</option>
            <option value="dti_ad">DTI — AD (Axial Diffusivity)</option>
            <option value="dti_md">DTI — MD (Mean Diffusivity)</option>
            <option value="dti_rd">DTI — RD (Radial Diffusivity)</option>
          </optgroup>
          <optgroup label="DKI">
            <option value="dki_ak" selected>DKI — AK (Axial Kurtosis)</option>
            <option value="dki_mk">DKI — MK (Mean Kurtosis)</option>
            <option value="dki_rk">DKI — RK (Radial Kurtosis)</option>
            <option value="dki_fa">DKI — FA</option>
            <option value="dki_md">DKI — MD</option>
          </optgroup>
          <optgroup label="NODDI">
            <option value="noddi_odi">NODDI — ODI</option>
            <option value="noddi_ndi">NODDI — NDI</option>
          </optgroup>
        </select>
      </div>
    </div>

    <hr class="divider">

    <!-- MACRO GROUP FILTER -->
    <div class="field-group">
      <div class="section-label">Macro Group Filter</div>
      <div class="macro-pills" id="macro-pills">
        <button class="macro-pill active" data-val="all" onclick="setMacro('all')">All</button>
        <button class="macro-pill" data-val="Association" onclick="setMacro('Association')">Association</button>
        <button class="macro-pill" data-val="Commissural" onclick="setMacro('Commissural')">Commissural</button>
        <button class="macro-pill" data-val="Projection" onclick="setMacro('Projection')">Projection</button>
        <button class="macro-pill" data-val="Cerebellar/Brainstem" onclick="setMacro('Cerebellar/Brainstem')">Cerebellar</button>
        <button class="macro-pill" data-val="White_Matter" onclick="setMacro('White_Matter')">White Matter</button>
        <button class="macro-pill" data-val="Gray_Matter" onclick="setMacro('Gray_Matter')">Gray Matter</button>
        <button class="macro-pill" data-val="Whole_Brain" onclick="setMacro('Whole_Brain')">Whole Brain</button>
        <button class="macro-pill" data-val="Mixed" onclick="setMacro('Mixed')">Mixed</button>
      </div>
    </div>

    <hr class="divider">

    <!-- ROI SOURCE -->
    <div class="field-group">
      <div class="section-label">ROI Atlas / Source</div>
      <div class="select-wrap">
        <select id="roi-source" onchange="onSourceChange()">
          <option value="jhu">JHU White Matter Atlas</option>
          <option value="tractseg">TractSeg</option>
          <option value="mask">Brain Mask</option>
          <option value="synthseg">SynthSeg</option>
        </select>
      </div>
    </div>

    <!-- ROI NAME -->
    <div class="field-group">
      <div class="section-label">Region of Interest</div>
      <div class="select-wrap">
        <select id="roi-name" onchange="onRoiNameChange()"></select>
      </div>
    </div>

    <!-- HEMISPHERE -->
    <div class="field-group" id="hemi-group">
      <div class="section-label">Hemisphere</div>
      <div class="hemi-pills">
        <button class="hemi-pill active" data-val="both" onclick="setHemi('both')">Both</button>
        <button class="hemi-pill" data-val="L" onclick="setHemi('L')">Left</button>
        <button class="hemi-pill" data-val="R" onclick="setHemi('R')">Right</button>
      </div>
    </div>

    <!-- ROI PREVIEW -->
    <div id="roi-preview">—</div>

    <hr class="divider">

    <!-- ACTIONS -->
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-plot" onclick="plotSelectedCurve()">
        ＋ Plot
      </button>
      <button class="btn btn-ghost" onclick="clearPlot()">
        ✕ Clear
      </button>
    </div>

    <hr class="divider">

    <!-- CURVE LIST -->
    <div class="field-group">
      <div class="section-label">Plotted curves</div>
      <div id="curve-list">
        <div id="no-curves">No curves plotted yet.</div>
      </div>
    </div>

    <hr class="divider">

    <!-- CURVE MODE -->
    <div class="field-group">

    <div class="section-label">Curve Mode</div>

    <div class="gender-pills">

        <button class="gender-pill active-F"
                id="mode-percentile"
                onclick="setCurveMode('percentile')">

        Percentiles

        </button>

        <button class="gender-pill"
                id="mode-zscore"
                onclick="setCurveMode('zscore')">

        Z-Scores

        </button>

    </div>

    </div>

    <!-- CURVE OPTIONS -->
    <div class="field-group">

    <div class="section-label">Curve Options</div>

    <label style="margin-bottom:6px;">
        <input type="checkbox" id="showOuter" checked>
        Outer curves (P3/P97 or Z±2)
    </label>

    <label style="margin-bottom:6px;">
        <input type="checkbox" id="showInner" checked>
        Inner curves (P15/P85 or Z±1)
    </label>

    <label style="margin-bottom:6px;">
        <input type="checkbox" id="showMedian" checked>
        Median / Z0
    </label>

    <label>
        <input type="checkbox" id="showShade" checked>
        Shade between curves
    </label>

    </div>

  </div><!-- /sidebar -->

 
  <!-- ── GRAPH AREA ── -->
  <div class="graph-area">
    <div id="graph"></div>
    <div id="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">Loading file index…</span>
    </div>
  </div>

</div><!-- /layout -->

<script>

//////////////////////////////////////////////////////////
// ROI CATALOGUE & MACRO-GROUP MAP
//////////////////////////////////////////////////////////

// MacroGroup for each ROI key/source
const MACRO_MAP = {
  // JHU
  jhu: {
    ACR:   'Projection', ALIC:  'Projection', BCC:   'Commissural', CC:    'Commissural',
    CGC:   'Association', CGH:   'Association', CP:    'Projection', CST:   'Projection',
    EC:    'Association', FX_ST: 'Association', FX:    'Association', GCC:   'Commissural',
    ICP:   'Cerebellar/Brainstem', MCP:   'Cerebellar/Brainstem', ML:    'Cerebellar/Brainstem',
    PCR:   'Projection', PCT:   'Cerebellar/Brainstem', PLIC:  'Projection', PTR:   'Projection',
    RLIC:  'Projection', SCC:   'Commissural', SCP:   'Cerebellar/Brainstem', SCR:   'Projection',
    SFO:   'Association', SLF:   'Association', SS:    'Association', TAP:   'Commissural',
    UF:    'Association',
  },
  tractseg: {
    AF: 'Association', ATR: 'Projection', CA: 'Commissural', CC: 'Commissural',
    CC_1: 'Commissural', CC_2: 'Commissural', CC_3: 'Commissural', CC_4: 'Commissural',
    CC_5: 'Commissural', CC_6: 'Commissural', CC_7: 'Commissural',
    CG: 'Association', CST: 'Projection', FPT: 'Projection', FX: 'Association',
    ICP: 'Cerebellar/Brainstem', IFO: 'Association', ILF: 'Association',
    MCP: 'Cerebellar/Brainstem', MLF: 'Association', OR: 'Projection',
    POPT: 'Projection', SCP: 'Cerebellar/Brainstem',
    SLF_I: 'Association', SLF_II: 'Association', SLF_III: 'Association',
    STR: 'Projection',
    ST_FO: 'Projection', ST_OCC: 'Projection', ST_PAR: 'Projection',
    ST_POSTC: 'Projection', ST_PREC: 'Projection', ST_PREF: 'Projection', ST_PREM: 'Projection',

  mask:     { mask3d: 'Whole_Brain' },
  synthseg: { CbWM: 'White_Matter', CbllWM: 'White_Matter', Ctx: 'Gray_Matter', Hipp: 'Gray_Matter', SubCtx: 'Gray_Matter' },

const ROI_CATALOGUE = {

  jhu: [
    { label: "Anterior Corona Radiata",          key: "ACR",    bilateral: true  },
    { label: "Anterior Limb of Int. Capsule",    key: "ALIC",   bilateral: true  },
    { label: "Body of Corpus Callosum",          key: "BCC",    bilateral: false },

    { label: "Cingulum (cingulate gyrus)",       key: "CGC",    bilateral: true  },
    { label: "Cingulum (hippocampus)",           key: "CGH",    bilateral: true  },
    { label: "Cerebral Peduncle",                key: "CP",     bilateral: true  },
    { label: "Corticospinal Tract",              key: "CST",    bilateral: true  },
    { label: "External Capsule",                 key: "EC",     bilateral: true  },
    { label: "Fornix (cres) / Stria terminalis", key: "FX_ST",  bilateral: true  },
    { label: "Fornix",                           key: "FX",     bilateral: false },
    { label: "Genu of Corpus Callosum",          key: "GCC",    bilateral: false },
    { label: "Inferior Cerebellar Peduncle",     key: "ICP",    bilateral: true  },
    { label: "Middle Cerebellar Peduncle",       key: "MCP",    bilateral: false },
    { label: "Medial Lemniscus",                 key: "ML",     bilateral: true  },
    { label: "Posterior Corona Radiata",         key: "PCR",    bilateral: true  },
    { label: "Pontine Crossing Tract",           key: "PCT",    bilateral: false },
    { label: "Post. Limb of Int. Capsule",       key: "PLIC",   bilateral: true  },
    { label: "Post. Thalamic Radiation",         key: "PTR",    bilateral: true  },
    { label: "Retrolenticular Int. Capsule",     key: "RLIC",   bilateral: true  },
    { label: "Splenium of Corpus Callosum",      key: "SCC",    bilateral: false },
    { label: "Superior Cerebellar Peduncle",     key: "SCP",    bilateral: true  },
    { label: "Superior Corona Radiata",          key: "SCR",    bilateral: true  },
    { label: "Superior Fronto-Occipital Fasc.",  key: "SFO",    bilateral: true  },
    { label: "Superior Longitudinal Fasc.",      key: "SLF",    bilateral: true  },
    { label: "Sagittal Stratum",                 key: "SS",     bilateral: true  },
    { label: "Tapetum",                          key: "TAP",    bilateral: true  },
    { label: "Uncinate Fasciculus",              key: "UF",     bilateral: true  },
  ],

  tractseg: [
    { label: "Arcuate Fasciculus",               key: "AF",       bilateral: true  },

//////////////////////////////////////////////////////////

// Set of all known filenames without path
let FILE_INDEX = new Set();

async function loadFileIndex() {
  try {
    const r = await fetch('file_names.txt');
    if (!r.ok) throw new Error('file_names.txt not found');
    const text = await r.text();
    FILE_INDEX = new Set(
      text.split('\n')
          .map(l => l.trim())
          .filter(l => l.endsWith('.json'))
    );
    setStatus('Ready. Select a metric and ROI, then click Plot.', '');
  } catch (e) {
    // graceful degradation — file_names.txt not required, just means
    // we can't validate filenames before fetching
    setStatus('Ready (no file index). Select metric and ROI, then click Plot.', '');
  }
  populateRoiNames();
}

//////////////////////////////////////////////////////////
// FILENAME BUILDER  (dynamic lookup)
//////////////////////////////////////////////////////////

/*
  Pattern (from real files):
    gamlss_<ROI>_<METRIC_NAME>_<AGE_TERM>_S0_<PROTOCOL>_Cms_SHASH_fp_<NPOLY>.json

  Where:
    METRIC_NAME  = bgpdwis_PA_{metric}_median
    AGE_TERM     = 'Ams' for dti_* ; 'Am' for everything else
    PROTOCOL     = 'Pm' for dki_ak and noddi_odi ; 'P0' for everything else
    NPOLY        = 'npoly2' for dti_fa, dki_fa, dki_md ; 'npoly1' for everything else

  BUT npoly can vary — so we look up in FILE_INDEX first, then fallback to hardcoded rules.
*/

//////////////////////////////////////////////////////////
// METRIC NAME MAP
//////////////////////////////////////////////////////////

const METRIC_NAME_MAP = {

  dki_ak:    'bgpdwis_PA_dki_ak_median',
  dki_mk:    'bgpdwis_PA_dki_mk_median',
  dki_rk:    'bgpdwis_PA_dki_rk_median',
  dki_fa:    'bgpdwis_PA_dki_fa_median',
  dki_md:    'bgpdwis_PA_dki_md_median',

  dti_fa:    'bgpdwis_PA_dti_fa_median',
  dti_ad:    'bgpdwis_PA_dti_ad_median',
  dti_md:    'bgpdwis_PA_dti_md_median',
  dti_rd:    'bgpdwis_PA_dti_rd_median',

  noddi_odi: 'bgpdwis_PA_noddi_odi_median',
  noddi_ndi: 'bgpdwis_PA_noddi_ndi_median',
};

//////////////////////////////////////////////////////////
// FILENAME LOOKUP
//////////////////////////////////////////////////////////

function buildJsonFilename(metric, roi) {

  const metricName = METRIC_NAME_MAP[metric];

  if (!metricName) {
    console.error(`Unknown metric: ${metric}`);
    return null;
  }

  //////////////////////////////////////////////////////
  // NO INDEX AVAILABLE
  //////////////////////////////////////////////////////

  if (FILE_INDEX.size === 0) {

    console.warn('FILE_INDEX vazio');

    return null;
  }

  //////////////////////////////////////////////////////
  // FLEXIBLE SEARCH
  //////////////////////////////////////////////////////

  for (const fname of FILE_INDEX) {

    // precisa:
    // 1) começar com gamlss_
    // 2) conter ROI inteira
    // 3) conter métrica inteira

    if (
      fname.startsWith('gamlss_') &&
      fname.includes(`_${roi}_`) &&
      fname.includes(`_${metricName}_`)
    ) {

      return fname;
    }
  }

  //////////////////////////////////////////////////////
  // NOT FOUND
  //////////////////////////////////////////////////////

  console.warn(`No filename found for ROI=${roi} metric=${metric}`);

  return null;
}

//////////////////////////////////////////////////////////
// ROI STRING RESOLVER
//////////////////////////////////////////////////////////

function resolveRoiString(source, key, hemi) {

  //////////////////////////////////////////////////////
  // JHU
  //////////////////////////////////////////////////////

  if (source === 'jhu') {

    const base = `JHUICBMlabels1mm_warped_s_${key}`;

    if (hemi === 'L') return `${base}_L_e1`;
    if (hemi === 'R') return `${base}_R_e1`;

    return `${base}_e1`;
  }

  //////////////////////////////////////////////////////
  // TRACTSEG
  //////////////////////////////////////////////////////

  if (source === 'tractseg') {

    const isCC2 = key === 'CC';
    const roiPrefix = isCC2 ? 'tractseg2' : 'tractseg';

    const base = `${roiPrefix}_${key}`;

    if (hemi === 'L') return `${base}_left_e1`;
    if (hemi === 'R') return `${base}_right_e1`;

    return `${base}_e1`;
  }

  //////////////////////////////////////////////////////
  // WHOLE BRAIN MASK
  //////////////////////////////////////////////////////

  if (source === 'mask') {
    return 'bgpdwis_PA_geomcorr_mask3d_e1';
  }

  //////////////////////////////////////////////////////
  // SYNTHSEG
  //////////////////////////////////////////////////////

  if (source === 'synthseg') {

    const base = `bgpdwis_PA_geomcorr_maskseg_${key}`;

    // bilateral structures
    const bilateralStructures = [
      'CbllWM',
      'CbWM',
      'Ctx',
      'Hipp',
      'SubCtx'
    ];

    const isBilateral = bilateralStructures.includes(key);

    // left/right available
    if (isBilateral) {

      if (hemi === 'L') return `${base}_L_e1`;

      if (hemi === 'R') return `${base}_R_e1`;

      // BOTH
      return `${base}_e1`;
    }

    // fallback
    return `${base}_e1`;
  }

  return null;
}

function getRoiStrings(source, key, hemi, bilateral) {
  if (!bilateral || hemi !== 'both') {
    return [resolveRoiString(source, key, hemi)];
  }
  return [
    resolveRoiString(source, key, 'L'),
    resolveRoiString(source, key, 'R'),
  ];
}

//////////////////////////////////////////////////////////
// UI: SOURCE / ROI CHANGE
//////////////////////////////////////////////////////////

function onSourceChange() {
  populateRoiNames();
  onRoiNameChange();
}

function populateRoiNames() {
  const source = document.getElementById('roi-source').value;
  const rois   = ROI_CATALOGUE[source] || [];
  const sel    = document.getElementById('roi-name');
  const macroMap = MACRO_MAP[source] || {};

  const seen = new Set();
  sel.innerHTML = '';

  rois.forEach(r => {
    if (seen.has(r.key)) return;
    seen.add(r.key);

    // Filter by macro group
    if (selectedMacro !== 'all') {
      const roiMacro = macroMap[r.key];
      if (roiMacro !== selectedMacro) return;
    }

    const opt = document.createElement('option');
    opt.value = r.key;
    opt.text  = r.label;
    opt.dataset.bilateral = r.bilateral ? '1' : '0';
    sel.appendChild(opt);
  });

  if (sel.options.length === 0) {
    const opt = document.createElement('option');
    opt.text = '— no ROIs in this group —';
    opt.disabled = true;
    sel.appendChild(opt);
  }

  updateHemiPills();
  updatePreview();
}

function onRoiNameChange() {
  updateHemiPills();
  updatePreview();
}

function getCurrentRoiEntry() {
  const source = document.getElementById('roi-source').value;
  const key    = document.getElementById('roi-name').value;
  return (ROI_CATALOGUE[source] || []).find(r => r.key === key);
}

function updateHemiPills() {
  const entry = getCurrentRoiEntry();
  const bilateral = entry ? entry.bilateral : false;
  const pills = document.querySelectorAll('.hemi-pill');

  if (!bilateral) {
    pills.forEach(p => { p.disabled = true; p.classList.remove('active'); });
    selectedHemi = 'none';
  } else {
    pills.forEach(p => { p.disabled = false; });
    if (selectedHemi === 'none') selectedHemi = 'L';
    document.querySelectorAll('.hemi-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.val === selectedHemi);
    });
  }

  updatePreview();
}

function updatePreview() {
  const source = document.getElementById('roi-source').value;
  const entry  = getCurrentRoiEntry();
  if (!entry) { document.getElementById('roi-preview').innerHTML = '—'; return; }

  const metric = document.getElementById('metricas').value;
  const rois = getRoiStrings(source, entry.key, selectedHemi, entry.bilateral);

  const lines = rois.map(roi => {
    const fname = buildJsonFilename(metric, roi);
    if (!fname) return `<span class="warn">⚠ ${roi} — not in index</span>`;
    if (FILE_INDEX.size > 0 && !FILE_INDEX.has(fname)) {
      return `<span class="warn">⚠ ${fname}</span>`;
    }
    return `<span class="key">${fname}</span>`;
  });

  document.getElementById('roi-preview').innerHTML = lines.join('<br>');
}

async function loadCurve(filename, gender) {
  const response = await fetch(`curves/${filename}`);
  if (!response.ok) throw new Error(`File not found:\n${filename}`);
  const json = await response.json();
  return json.data[gender];
}

function hexToRgba(hsl, alpha) {
  // hsl is like 'hsl(200,70%,45%)' — we'll just pass it through Plotly
  return hsl.replace('hsl(', 'hsla(').replace(')', `,${alpha})`);
}

async function plotSelectedCurve() {
  const metric = document.getElementById('metricas').value;
  const source = document.getElementById('roi-source').value;
  const entry  = getCurrentRoiEntry();

  if (!entry) { setStatus('No ROI selected.', 'error'); return; }

  const roiStrings = getRoiStrings(source, entry.key, selectedHemi, entry.bilateral);

  setStatus(`Loading ${roiStrings.length} curve(s)…`, 'loading');
  document.getElementById('btn-plot').disabled = true;

  const hue   = (curveCount * 57) % 360;
  const color = `hsl(${hue},70%,40%)`;  // darker for light bg
  curveCount++;

  const newTraces = [];
  let loadedAll = true;

  for (const roi of roiStrings) {
    const fname = buildJsonFilename(metric, roi);
    if (!fname) {
      setStatus(`No file found for ${roi} / ${metric}`, 'error');
      loadedAll = false;
      continue;
    }

    const hemiLabel = roi.includes('_L_') || roi.includes('_left_') ? ' L'
                    : roi.includes('_R_') || roi.includes('_right_') ? ' R'
                    : '';
    const prefix = `${metric.toUpperCase()} | ${entry.label}${hemiLabel} | ${selectedGender}`;

    try {
      const curve = await loadCurve(fname, selectedGender);
      const x = curve.grid;

      // Colors with varying opacity
      const solid   = `hsl(${hue},70%,40%)`;
      const mid     = `hsla(${hue},65%,45%,0.75)`;
      const outer   = `hsla(${hue},60%,50%,0.45)`;
      const fill3   = `hsla(${hue},60%,75%,0.15)`;
      const fill15  = `hsla(${hue},60%,70%,0.20)`;

      const showOuter  = document.getElementById('showOuter').checked;
const showInner  = document.getElementById('showInner').checked;
const showMedian = document.getElementById('showMedian').checked;
const showShade  = document.getElementById('showShade').checked;

//////////////////////////////////////////////////////////
// PERCENTILES
//////////////////////////////////////////////////////////

if (curveMode === 'percentile') {

  // OUTER
  if (showOuter && curve.P3 && curve.P97) {

    newTraces.push({
      x,
      y: curve.P97,
      mode: 'lines',
      line: {
        color: outer,
        width: 1,
        dash: 'dot'
      },
      showlegend: false,
      legendgroup: prefix,
    });

    newTraces.push({
      x,
      y: curve.P3,
      mode: 'lines',

      fill: showShade ? 'tonexty' : undefined,
      fillcolor: fill3,

      line: {
        color: outer,
        width: 1,
        dash: 'dot'
      },

      name: `${prefix} P3/P97`,
      legendgroup: prefix,
    });
  }

  // INNER
  if (showInner && curve.P15 && curve.P85) {

    newTraces.push({
      x,
      y: curve.P85,
      mode: 'lines',
      line: {
        color: mid,
        width: 1.5
      },
      showlegend: false,
      legendgroup: prefix,
    });

    newTraces.push({
      x,
      y: curve.P15,
      mode: 'lines',

      fill: showShade ? 'tonexty' : undefined,
      fillcolor: fill15,

      line: {
        color: mid,
        width: 1.5
      },

      name: `${prefix} P15/P85`,
      legendgroup: prefix,
    });
  }

  // MEDIAN
  if (showMedian && curve.P50) {

    newTraces.push({
      x,
      y: curve.P50,
      mode: 'lines',

      line: {
        color: solid,
        width: 3
      },

      name: `${prefix} P50`,
      legendgroup: prefix,
    });
  }
}


//////////////////////////////////////////////////////////
// Z-SCORES
//////////////////////////////////////////////////////////

if (curveMode === 'zscore') {

    const Zm3 = curve['z-3'];
    const Zm2 = curve['z-2'];
    const Zm1 = curve['z-1'];

    const Z0  = curve['z0'];

    const Z1  = curve['z1'];
    const Z2  = curve['z2'];
    const Z3  = curve['z3'];

    //////////////////////////////////////////////////////
    // OUTER BAND  (Z-2 / Z+2)
    //////////////////////////////////////////////////////

    if (showOuter && Zm2 && Z2) {

        newTraces.push({
        x,
        y: Z2,

        mode: 'lines',

        line: {
            color: outer,
            width: 1,
            dash: 'dot'
        },

        showlegend: false,
        legendgroup: prefix,
        });

        newTraces.push({
        x,
        y: Zm2,

        mode: 'lines',

        fill: showShade ? 'tonexty' : undefined,
        fillcolor: fill3,

        line: {
            color: outer,
            width: 1,
            dash: 'dot'
        },

        name: `${prefix} Z±2`,
        legendgroup: prefix,
        });
    }

    //////////////////////////////////////////////////////
    // INNER BAND  (Z-1 / Z+1)
    //////////////////////////////////////////////////////

    if (showInner && Zm1 && Z1) {

        newTraces.push({
        x,
        y: Z1,

        mode: 'lines',

        line: {
            color: mid,
            width: 1.5
        },

        showlegend: false,
        legendgroup: prefix,
        });

        newTraces.push({
        x,
        y: Zm1,

        mode: 'lines',

        fill: showShade ? 'tonexty' : undefined,
        fillcolor: fill15,

        line: {
            color: mid,
            width: 1.5
        },

        name: `${prefix} Z±1`,
        legendgroup: prefix,
        });
    }

    //////////////////////////////////////////////////////
    // MEDIAN (Z0)
    //////////////////////////////////////////////////////

    if (showMedian && Z0) {

        newTraces.push({
        x,
        y: Z0,

        mode: 'lines',

        line: {
            color: solid,
            width: 3
        },

        name: `${prefix} Z0`,
        legendgroup: prefix,
        });
    }
    }

    } catch (e) {
      setStatus(`Error: ${e.message}`, 'error');
      loadedAll = false;
    }
  }

  document.getElementById('btn-plot').disabled = false;

  if (newTraces.length === 0) return;

  const id = `curve-${Date.now()}`;
  const shortLabel = `${metric.toUpperCase()} · ${entry.label} · ${selectedGender}`;
  plotted.push({ id, color, traces: newTraces, label: shortLabel });
  allTraces.push(...newTraces);

  renderCurveList();

  // ── PERFORMANCE: use addTraces after first render instead of full redraw ──
  if (!plotInitialized) {
    renderPlotFull();
    plotInitialized = true;
  } else {
    Plotly.addTraces('graph', newTraces);
  }

  if (loadedAll) setStatus(`Plotted: ${shortLabel}`, 'ok');
}

function renderCurveList() {

  const list = document.getElementById('curve-list');

  if (!list) {
    console.error('curve-list não encontrado');
    return;
  }

  // limpa tudo SEM guardar referência antiga
  list.innerHTML = '';

  // sem curvas
  if (plotted.length === 0) {

    const empty = document.createElement('div');
    empty.id = 'no-curves';
    empty.textContent = 'No curves plotted yet.';

    list.appendChild(empty);

    return;
  }

  // render curvas
  plotted.forEach(p => {

    const tag = document.createElement('div');

    tag.className = 'curve-tag';
    tag.id = `tag-${p.id}`;

    tag.innerHTML = `

    <span class="curve-dot"
            style="background:${p.color}">
    </span>

    <span class="curve-tag-text">
        ${p.label}
    </span>

    <div class="curve-tooltip">
        ${p.label}
    </div>

    <button class="curve-remove"
            onclick="removeCurve('${p.id}')"
            title="Remove">
            ×
    </button>
    `;

    list.appendChild(tag);
  });
}

function removeCurve(id) {
  const entry = plotted.find(p => p.id === id);
  if (!entry) return;

  const traceSet = new Set(entry.traces);
  allTraces = allTraces.filter(t => !traceSet.has(t));
  plotted   = plotted.filter(p => p.id !== id);

  renderCurveList();
  // Full redraw needed after removal (indices shift)
  renderPlotFull();
  setStatus('Curve removed.', '');
}

//////////////////////////////////////////////////////////
// CLEAR
//////////////////////////////////////////////////////////

function clearPlot() {
  allTraces = [];
  plotted   = [];
  curveCount = 0;
  plotInitialized = false;
  renderCurveList();
  Plotly.react('graph', [], LIGHT_LAYOUT, { responsive: true });
  setStatus('Plot cleared.', '');
}

//////////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////////

// Kick off — load file index, then populate UI
loadFileIndex();

// Update preview when metric changes (npoly may differ)
document.getElementById('metricas').addEventListener('change', updatePreview);

</script>
</body>
