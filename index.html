<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>7TBRP Diffusion MRI Normative Charts</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f6fa;
    color:#333;
}

header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#2c3e50;
    color:white;
    padding:15px 20px;
    height:70px;
}

header span{
    flex:1;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.logo-left,
.logo-right{
    height:60px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.panel{
    width:420px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.graph-container{
    flex:1;
    min-width:700px;
    background:white;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

select{
    width:100%;
    margin-bottom:15px;
    padding:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2c3e50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1a252f;
}

#graph{
    width:100%;
    height:90vh;
}

</style>
</head>

<body>

<header>
    <img src="assets/logo_Pitt_neg.png" class="logo-left">

    <span>7TBRP Diffusion MRI Normative Charts</span>

    <img src="assets/logo_USP_EESC_neg.png" class="logo-right">
</header>

<div class="container">

    <div class="panel">

        <!-- GENDER -->
        <label><b>Gender</b></label>

        <select id="gender">

            <option value="F" selected>Female</option>
            <option value="M">Male</option>

        </select>

        <!-- METRICS -->
        <label><b>Metric</b></label>

        <select id="metricas">

            <optgroup label="DTI">
                <option value="dti_fa">DTI-FA</option>
                <option value="dti_ad">DTI-AD</option>
                <option value="dti_md">DTI-MD</option>
                <option value="dti_rd">DTI-RD</option>
            </optgroup>

            <optgroup label="DKI">
                <option value="dki_ak" selected>DKI-AK</option>
                <option value="dki_mk">DKI-MK</option>
                <option value="dki_rk">DKI-RK</option>
            </optgroup>

            <optgroup label="NODDI">
                <option value="noddi_odi">NODDI-ODI</option>
                <option value="noddi_ndi">NODDI-NDI</option>
                <option value="noddi_fwf">NODDI-FWF</option>
            </optgroup>

        </select>

        <!-- ROI -->
        <label><b>ROI</b></label>

        <select id="rois">

            <option value="mask3d_e1" selected>
                Brain
            </option>

            <option value="tractseg_AF_left">
                TractSeg AF Left
            </option>

        </select>

        <button onclick="plotSelectedCurve()">
            Plot Curve
        </button>
        <button onclick="clearPlot()">
            Clear Plot
        </button>

    </div>



    <div class="graph-container">

        <div id="graph"></div>

    </div>

</div>

<script>


//////////////////////////////////////////////////////////
// GLOBAL STORAGE
//////////////////////////////////////////////////////////

let allTraces = [];
let curveCount = 0;

//////////////////////////////////////////////////////////
// MAPS
//////////////////////////////////////////////////////////

const metricMap = {

    dki_ak: 'bgpdwis_PA_dki_ak_median',
    dki_mk: 'bgpdwis_PA_dki_mk_median',
    dki_rk: 'bgpdwis_PA_dki_rk_median',
    dki_fa: 'bgpdwis_PA_dki_fa_median',
    dki_md: 'bgpdwis_PA_dki_md_median',

    dti_fa: 'bgpdwis_PA_dti_fa_median',
    dti_ad: 'bgpdwis_PA_dti_ad_median',
    dti_md: 'bgpdwis_PA_dti_md_median',
    dti_rd: 'bgpdwis_PA_dti_rd_median',

    noddi_odi: 'bgpdwis_PA_noddi_odi_median',
    noddi_ndi: 'bgpdwis_PA_noddi_ndi_median'
};

const roiMap = {};

//////////////////////////////////////////////////////////
// BUILD JSON FILENAME
//////////////////////////////////////////////////////////

function buildJsonFilename(metric, roi){

    const metricName = metricMap[metric];

    const roiName = roi;

    let ageTerm = 'Am';

    if(metric.startsWith('dti_')){
        ageTerm = 'Ams';
    }

    let npoly = 'npoly1';

    const npoly2Metrics = [
        'dti_fa',
        'dki_md',
        'dki_fa'
    ];

    if(npoly2Metrics.includes(metric)){
        npoly = 'npoly2';
    }

    let protocol = 'P0';

    if(metric === 'dki_ak'){
        protocol = 'Pm';
    }

    return `gamlss_${roiName}_${metricName}_${ageTerm}_S0_${protocol}_Cms_SHASH_fp_${npoly}.json`;
}
//////////////////////////////////////////////////////////
// LOAD CURVE
//////////////////////////////////////////////////////////

async function loadCurve(metric, roi, gender='F'){

    const filename = buildJsonFilename(metric, roi);

    console.log('Loading:', filename);

    const response = await fetch(`curves/${filename}`);

    if(!response.ok){

        throw new Error(
            `Arquivo não encontrado:\n${filename}`
        );
    }

    const json = await response.json();

    return json.data[gender];
}

async function populateROIs(){

    const response =
        await fetch("available_rois.json");

    const rois = await response.json();

    const select =
        document.getElementById("rois");

    select.innerHTML = "";

    rois.forEach(roi => {

        const option =
            document.createElement("option");

        option.value = roi;

        option.text = roi;

        select.appendChild(option);
    });
}

//////////////////////////////////////////////////////////
// PLOT
//////////////////////////////////////////////////////////

async function plotSelectedCurve(){

    const metric =
        document.getElementById('metricas').value;

    const roi =
        document.getElementById('rois').value;

    const gender =
        document.getElementById('gender').value;

    try{

        const curve =
            await loadCurve(metric, roi, gender);

        const x = curve.grid;

        ////////////////////////////////////////////////////
        // UNIQUE COLOR
        ////////////////////////////////////////////////////

        const hue = (curveCount * 57) % 360;

        const color =
            `hsl(${hue},70%,45%)`;

        curveCount++;

        ////////////////////////////////////////////////////
        // PREFIX
        ////////////////////////////////////////////////////

        const prefix =
            `${metric.toUpperCase()} | ${roi} | ${gender}`;

        ////////////////////////////////////////////////////
        // TRACES
        ////////////////////////////////////////////////////

        const traces = [

            {
                x:x,
                y:curve.P3,
                mode:'lines',
                name:`${prefix} P3`,
                line:{
                    dash:'dot',
                    color:color,
                    width:1
                },
                opacity:0.35
            },

            {
                x:x,
                y:curve.P15,
                mode:'lines',
                name:`${prefix} P15`,
                line:{
                    color:color,
                    width:1
                },
                opacity:0.5
            },

            {
                x:x,
                y:curve.P50,
                mode:'lines',
                name:`${prefix} P50`,
                line:{
                    color:color,
                    width:4
                }
            },

            {
                x:x,
                y:curve.P85,
                mode:'lines',
                name:`${prefix} P85`,
                line:{
                    color:color,
                    width:1
                },
                opacity:0.5
            },

            {
                x:x,
                y:curve.P97,
                mode:'lines',
                name:`${prefix} P97`,
                line:{
                    dash:'dot',
                    color:color,
                    width:1
                },
                opacity:0.35
            }

        ];

        ////////////////////////////////////////////////////
        // APPEND
        ////////////////////////////////////////////////////

        allTraces.push(...traces);

        ////////////////////////////////////////////////////
        // LAYOUT
        ////////////////////////////////////////////////////

        const layout = {

            title: {

                text:'Normative Curves',
                font:{size:22}
            },

            xaxis: {

                title:'Age (years)',
                gridcolor:'#e5e5e5'
            },

            yaxis: {

                title:'Metric value',
                gridcolor:'#e5e5e5'
            },

            hovermode:'x unified',

            template:'plotly_white',

            legend:{
                orientation:'h',
                y:-0.2
            }

        };

        ////////////////////////////////////////////////////
        // REACT
        ////////////////////////////////////////////////////

        Plotly.react(
            'graph',
            allTraces,
            layout,
            {responsive:true}
        );

    }
    catch(err){

        console.error(err);

        alert(err.message);
    }
}

//////////////////////////////////////////////////////////
// CLEAR
//////////////////////////////////////////////////////////

function clearPlot(){

    allTraces = [];

    curveCount = 0;

    Plotly.react(
        'graph',
        [],
        {},
        {responsive:true}
    );
}

//////////////////////////////////////////////////////////
// AUTO LOAD
//////////////////////////////////////////////////////////

populateROIs();

plotSelectedCurve();

</script>

</body>
</html>
